<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Confirm your Legantis account</title>
  </head>
  <body
    style="
      margin: 0;
      padding: 0;
      background-color: #f4f4f5;
      font-family:
        system-ui,
        -apple-system,
        'Segoe UI',
        Roboto,
        Helvetica,
        Arial,
        sans-serif;
    "
  >
    <table
      role="presentation"
      width="100%"
      cellspacing="0"
      cellpadding="0"
      style="background-color: #f4f4f5; padding: 32px 16px"
    >
      <tr>
        <td align="center">
          <table
            role="presentation"
            width="100%"
            cellspacing="0"
            cellpadding="0"
            style="
              max-width: 480px;
              background-color: #ffffff;
              border-radius: 8px;
              border: 1px solid #e4e4e7;
            "
          >
            <tr>
              <td style="padding: 32px 28px 8px">
                <p
                  style="
                    margin: 0;
                    font-size: 15px;
                    font-weight: 600;
                    color: #18181b;
                    letter-spacing: -0.02em;
                  "
                >
                  Legantis
                </p>
              </td>
            </tr>
            <tr>
              <td style="padding: 8px 28px 0">
                <h1
                  style="
                    margin: 0;
                    font-size: 20px;
                    font-weight: 600;
                    color: #0f172a;
                    line-height: 1.3;
                  "
                >
                  Confirm your email
                </h1>
              </td>
            </tr>
            <tr>
              <td style="padding: 16px 28px 0">
                <p
                  style="
                    margin: 0;
                    font-size: 15px;
                    line-height: 1.6;
                    color: #3f3f46;
                  "
                >
                  Thanks for creating a Legantis account. Use the button below to verify your email
                  address and continue.
                </p>
              </td>
            </tr>
            <tr>
              <td style="padding: 24px 28px 32px">
                <a
                  href="{{ .ConfirmationURL }}"
                  style="
                    display: inline-block;
                    background-color: #18181b;
                    color: #ffffff;
                    text-decoration: none;
                    font-size: 14px;
                    font-weight: 600;
                    padding: 12px 20px;
                    border-radius: 6px;
                  "
                  >Confirm email address</a>
              </td>
            </tr>
            <tr>
              <td style="padding: 0 28px 28px">
                <p style="margin: 0; font-size: 12px; line-height: 1.5; color: #71717a">
                  If you did not sign up for Legantis, you can ignore this message.
                </p>
              </td>
            </tr>
          </table>
          <p style="margin: 24px 0 0; font-size: 11px; color: #a1a1aa">
            Transactional message for account security.
          </p>
        </td>
      </tr>
    </table>
  </body>
</html>
