  <script>
    (function () {
      try {
        /* Script for fixing url routes with special characters */
        const url = new URL(window.location.href);
        const originalPath = url.pathname;

        const parts = originalPath.split('/');
        let fixed = false;

        const encodedParts = parts.map(part => {
          const needsEncoding = /[()]/.test(part);
          if (needsEncoding) {
            fixed = true;
            return part.replace(/\(/g, '%28').replace(/\)/g, '%29');
          }
          return part;
        });

        if (fixed) {
          const fixedPath = encodedParts.join('/');
          const newUrl = fixedPath + (url.search || '') + (url.hash || '');
          console.log('Redirecting to encoded URL:', newUrl);
          window.location.replace(newUrl);
        }
      } catch (e) {
        console.error('URL fix failed:', e);
      }
    })();
  </script>
